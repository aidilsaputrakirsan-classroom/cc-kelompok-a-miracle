name: Deploy to Railway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Link Railway Project
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway link --project 195e962a-39ca-46fe-9707-15df5a085364

         # === DEPLOY BACKEND ===
      - name: Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci --service tracelt-backend

      - name: Health Check Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔍 Waiting for Backend..."
          sleep 20
          curl -f --retry 12 --retry-delay 10 --retry-all-errors \
            https://backend-production-c556.up.railway.app/health || exit 1
        timeout-minutes: 5

      # === DEPLOY FRONTEND ===
      - name: Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --ci --service tracelt-frontend

      - name: Health Check Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔍 Waiting for Frontend..."
          sleep 15
          curl -f --retry 8 --retry-delay 8 --retry-all-errors \
            https://tracelt-frontend-production.up.railway.app || exit 1
        timeout-minutes: 4