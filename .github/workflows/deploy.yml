name: Deploy to Railway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # === DEPLOY BACKEND ===
      - name: Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway deploy --service backend

      - name: Health Check Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔍 Waiting for Backend deployment..."
          sleep 15
          curl -f --retry 10 --retry-delay 8 --retry-all-errors \
            https://backend-production-c556.up.railway.app/health || exit 1
        timeout-minutes: 4

      # === DEPLOY FRONTEND ===
      - name: Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway deploy --service tracelt-frontend

      - name: Health Check Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔍 Waiting for Frontend deployment..."
          sleep 10
          curl -f --retry 6 --retry-delay 5 --retry-all-errors \
            https://tracelt-frontend-production.up.railway.app || exit 1
        timeout-minutes: 3

      - name: 🎉 Deployment Completed
        run: echo "Deployment berhasil dengan health check!"