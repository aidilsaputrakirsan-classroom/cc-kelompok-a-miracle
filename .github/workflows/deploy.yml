name: Deploy to Railway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      # === DEPLOY BACKEND ===
      - name: Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service tracelt-backend --ci

      - name: Health Check Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔍 Waiting for Backend deployment..."
          sleep 20
          curl -f --retry 12 --retry-delay 10 --retry-all-errors \
            https://backend-production-c556.up.railway.app/health || exit 1

      # === DEPLOY FRONTEND ===
      - name: Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service tracelt-frontend --ci

      - name: Health Check Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🔍 Waiting for Frontend deployment..."
          sleep 15
          curl -f --retry 8 --retry-delay 8 --retry-all-errors \
            https://tracelt-frontend-production.up.railway.app || exit 1

      - name: 🎉 Deployment Completed
        run: echo "Deployment berhasil dengan health check!"