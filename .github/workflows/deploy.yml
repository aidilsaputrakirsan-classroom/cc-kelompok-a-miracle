name: Deploy to Railway

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Login to Railway
        run: railway login --token ${{ secrets.RAILWAY_TOKEN }}

      # === DEPLOY BACKEND ===
      - name: Deploy Backend
        run: railway deploy --service backend

      - name: Health Check Backend
        run: |
          echo "Waiting for Backend deployment..."
          sleep 15
          curl -f --retry 7 --retry-delay 10 --retry-all-errors \
            https://backend-production-c556.up.railway.app/health || exit 1
        timeout-minutes: 3

      # === DEPLOY FRONTEND ===
      - name: Deploy Frontend
        run: railway deploy --service frontend

      - name: Health Check Frontend
        run: |
          echo "Waiting for Frontend deployment..."
          sleep 10
          curl -f --retry 5 --retry-delay 8 --retry-all-errors \
            https://tracelt-frontend-production.up.railway.app || exit 1
        timeout-minutes: 2

      - name: Deployment Success Notification
        run: echo "🎉 Deployment berhasil ke Railway!"