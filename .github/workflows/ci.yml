# ==============================================
# CI Pipeline — Cloud Team XX
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
#
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images (pastikan Dockerfile valid)

# ==============================================
# CI/CD Pipeline — Cloud Team XX
# ==============================================

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Lint
  # ============================================================
  lint:
    name: 🔍 Lint (Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check .

  # ============================================================
  # Test Backend
  # ============================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracelt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run health check test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tracelt_test
          SECRET_KEY: 0c0e1ed2-77b5-474d-8fcc-e5e7fcf07f39
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          ALLOWED_ORIGINS: http://localhost:3000
        run: |
          python -c "
          from main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          response = client.get('/health')
          assert response.status_code == 200
          print('Health check passed:', response.json())
          "

  # ============================================================
  # Build Frontend
  # ============================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

  # ============================================================
  # Lint
  # ============================================================
  lint:
    name: 🔍 Lint (Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check .

  # ============================================================
  # Build & Push Docker
  # ============================================================
  docker:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test-backend, build-frontend]

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================================
  # Deploy to Railway (CD)
  # ============================================================
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying Backend..."
          cd backend
          railway deploy --service tracelt-backend --detach

      - name: 🚀 Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Deploying Frontend..."
          cd frontend
          railway deploy --service tracelt-frontend --detach

      - name: ✅ Deployment Summary
        id: summary
        run: |
          TIMESTAMP=$(date '+%Y-%m-%d %H:%M:%S WITA')
          
          echo "## 🚀 Deployment Berhasil!" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: [${{ github.sha }}](https://github.com/${{ github.repository }}/commit/${{ github.sha }})" >> $GITHUB_STEP_SUMMARY
          echo "**Waktu Deploy**: $TIMESTAMP" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🌐 Deployment URLs" >> $GITHUB_STEP_SUMMARY
          echo "- **Backend**: https://cc-kelompok-a-miracle-backend.up.railway.app" >> $GITHUB_STEP_SUMMARY
          echo "- **Frontend**: https://cc-kelompok-a-miracle-frontend.up.railway.app" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ Deployment selesai." >> $GITHUB_STEP_SUMMARY

          # Simpan untuk PR comment jika diperlukan
          echo "timestamp=$TIMESTAMP" >> $GITHUB_OUTPUT
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============================================================
  # Notify PR (Success + Summary)
  # ============================================================
  notify-pr:
    name: 📝 Post Deployment Summary to PR
    runs-on: ubuntu-latest
    needs: [deploy]
    if: always() && github.event_name == 'pull_request'

    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const success = '${{ needs.deploy.result }}' === 'success';
            const sha = '${{ github.sha }}'.substring(0, 7);
            const timestamp = new Date().toLocaleString('id-ID', { timeZone: 'Asia/Makassar' });
            
            let body = `## ${success ? '✅ Deployment Preview' : '❌ Deployment Gagal'}\n\n`;
            body += `**Commit**: ${sha}\n`;
            body += `**Waktu**: ${timestamp} WITA\n\n`;
            
            if (success) {
              body += '### 🌐 Deployment URLs\n';
              body += '- **Backend**: https://cc-kelompok-a-miracle-backend.up.railway.app\n';
              body += '- **Frontend**: https://cc-kelompok-a-miracle-frontend.up.railway.app\n';
            } else {
              body += '❌ Deploy gagal. Cek log workflow untuk detailnya.';
            }
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
