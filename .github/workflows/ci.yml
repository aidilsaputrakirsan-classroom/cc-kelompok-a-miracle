# ==============================================
# CI Pipeline — Miracle
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
# 
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images (pastikan Dockerfile valid)

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ==================== LINT ====================
  lint:
    name: 🔍 Lint (Ruff)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Ruff
        run: pip install ruff
      - name: Run Ruff
        run: ruff check .

  # ==================== TEST BACKEND ====================
  test_backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracelt_test
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Health Check Test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tracelt_test
          SECRET_KEY: test-secret-key-for-ci
        run: |
          python -c "
          from fastapi.testclient import TestClient
          from main import app
          client = TestClient(app)
          response = client.get('/health')
          assert response.status_code == 200
          print('Health check passed')
          "

  # ==================== BUILD FRONTEND ====================
  build_frontend:
    name: ⚛️ Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        env:
          VITE_API_URL: http://localhost:3000
        run: npm run build

  # ==================== BUILD DOCKER ====================
  docker:
    name: 🐳 Build Docker Images
    runs-on: ubuntu-latest
    needs: [lint, test_backend, build_frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Backend
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-backend:${{ github.sha }}

      - name: Build & Push Frontend
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-frontend:${{ github.sha }}

  # ==================== DEPLOY TO RAILWAY + HEALTH CHECK ====================
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd backend
          railway up --service backend --detach

      - name: Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd frontend
          railway up --service frontend --detach

      # ================== HEALTH CHECK ==================
      - name: 🏥 Health Check Backend
        run: |
          echo "⏳ Menunggu backend siap..."
          sleep 25
          
          HEALTH_URL="https://backend-production-c556.up.railway.app/health"
          echo "Checking: $HEALTH_URL"
          
          for i in {1..10}; do
            if curl -s -f $HEALTH_URL > /dev/null; then
              echo "✅ Backend Health Check BERHASIL"
              exit 0
            fi
            echo "⏳ Attempt $i/10 - waiting..."
            sleep 10
          done
          
          echo "⚠️ Health check gagal, tapi deployment sudah dilakukan."

      - name: 🏥 Health Check Frontend
        run: |
          echo "⏳ Menunggu frontend siap..."
          sleep 15
          FRONTEND_URL="https://tracelt-frontend-production.up.railway.app"
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" $FRONTEND_URL)
          echo "Frontend status: $HTTP_STATUS"

      - name: ✅ Deployment Summary
        run: |
          echo "## 🚀 Deployment Berhasil!" >> $GITHUB_STEP_SUMMARY
          echo "**Waktu**: $(date '+%Y-%m-%d %H:%M:%S WITA')" >> $GITHUB_STEP_SUMMARY
          echo "- Backend : https://backend-production-c556.up.railway.app" >> $GITHUB_STEP_SUMMARY
          echo "- Frontend: https://tracelt-frontend-production.up.railway.app" >> $GITHUB_STEP_SUMMARY