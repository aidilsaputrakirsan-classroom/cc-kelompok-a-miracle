# ==============================================
# CI Pipeline — Cloud Team XX
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
# 
# Jobs:
# 1. test-backend: Install deps + run pytest
# 2. test-frontend: Install deps + run vitest
# 3. build-docker: Build Docker images (pastikan Dockerfile valid)

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

# ========================================
# Cancel workflow lama jika ada push baru
# ========================================
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================
  # Job 1: Test Backend
  # ============================================================
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracelt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run health check test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tracelt_test
          SECRET_KEY: test-secret-key-for-ci
          ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          ALLOWED_ORIGINS: http://localhost:3000
        run: |
          python -c "
          from main import app
          from fastapi.testclient import TestClient
          client = TestClient(app)
          response = client.get('/health')
          assert response.status_code == 200
          print('Health check passed:', response.json())
          "

  # ============================================================
  # Job 2: Build Frontend
  # ============================================================
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: http://localhost:3000

  # ============================================================
   # ================================
  # JOB: Build & Push Docker Images
  # ================================
  docker:
    name: 🐳 Build & Push Docker Images
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [lint, test-backend, build-frontend]   # Tambah lint

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔑 Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 🏗️ Build & Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: 🏗️ Build & Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/cc-kelompok-a-miracle-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  # ================================
  # JOB BARU: Lint (Ruff)
  # ================================
  lint:
    name: 🔍 Lint (Ruff)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 📦 Install Ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: 🔍 Run Ruff Linter
        run: ruff check .

  # ========================================
  # Job: Notify PR if CI fails
  # ========================================
  notify-failure:
    name: Notify CI Failure
    runs-on: ubuntu-latest

    needs:
      - test-backend
      - build-frontend
      - docker
      - lint

    if: failure() && github.event_name == 'pull_request'

    steps:
      - name: Comment on PR when CI fails
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ CI Pipeline gagal. Silakan cek GitHub Actions logs untuk detail error.'
            })

# ========================================
# JOB BARU: DEPLOY TO RAILWAY (CD)
# ========================================
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [docker]                    # Deploy hanya jika build docker sukses
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd backend
          railway up --service backend --detach

      - name: 🚀 Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd frontend
          railway up --service frontend --detach

      - name: ✅ Deployment Summary
        run: |
          echo "## 🚀 Deployment Berhasil!" >> $GITHUB_STEP_SUMMARY
          echo "**Repository**: ${{ github.repository }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "**Time**: $(date)" >> $GITHUB_STEP_SUMMARY
          echo "✅ Backend & Frontend telah di-deploy ke Railway." >> $GITHUB_STEP_SUMMARY

# ========================================

name: CI/CD - Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python (untuk backend test)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies & Test Backend
        run: |
          cd backend
          pip install -r requirements.txt
          pytest

      - name: Setup Node (untuk frontend test)
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Test Frontend
        run: |
          cd frontend
          npm ci
          npm test

      # ==================== DEPLOY SECTION ====================
      - name: Setup Railway CLI
        run: curl -fsSL https://railway.app/cli.sh | sh

      - name: Deploy Backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd backend
          railway up --service backend -y

      - name: Deploy Frontend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd frontend
          railway up --service frontend -y

      # ==================== TUGAS KHUSUS LEAD CI/CD ====================
      - name: 🚀 Deployment Summary & Notification
        env:
          BACKEND_URL: https://backend-kamu.up.railway.app     # GANTI dengan URL asli kamu
          FRONTEND_URL: https://frontend-kamu.up.railway.app   # GANTI dengan URL asli kamu
          COMMIT_SHA: ${{ github.sha }}
          COMMIT_MSG: ${{ github.event.head_commit.message || 'Manual trigger' }}
          TIMESTAMP: ${{ format('{0}', steps.current-time.outputs.time) }}
        run: |
          echo "========================================"
          echo "✅ DEPLOYMENT BERHASIL!"
          echo "========================================"
          echo "📅 Waktu     : $(date '+%Y-%m-%d %H:%M:%S WITA')"
          echo "🔗 Backend   : $BACKEND_URL"
          echo "🔗 Frontend  : $FRONTEND_URL"
          echo "📌 Commit    : $COMMIT_SHA"
          echo "💬 Pesan     : $COMMIT_MSG"
          echo "========================================"

          # Buat file untuk PR Comment
          cat << EOF > deployment-summary.md
          ## 🚀 Deployment Summary

          **Status:** ✅ Success
          **Tanggal:** $(date '+%d %B %Y, %H:%M WITA')
          **Commit:** [${COMMIT_SHA:0:7}](https://github.com/${{ github.repository }}/commit/${COMMIT_SHA})
          **Pesan Commit:** ${COMMIT_MSG}

          ### 🌐 Production Links
          - **Frontend** → [${FRONTEND_URL}](${FRONTEND_URL})
          - **Backend API** → [${BACKEND_URL}](${BACKEND_URL})
          - **API Docs** → [${BACKEND_URL}/docs](${BACKEND_URL}/docs)

          Deployment dilakukan secara otomatis via GitHub Actions.
          EOF

      # Tambahkan comment ke PR (jika merge dari PR)
      - name: 💬 Add Summary to PR Comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('deployment-summary.md', 'utf8');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });