# ==============================================
# CI/CD Pipeline — Miracle
# ==============================================
# Pipeline ini berjalan otomatis saat:
# - Push ke branch main
# - Pull Request ke branch main
#
# Jobs:
# 1. test-backend: Install deps + run pytest + health check
# 2. test-frontend: Install deps + run test + build
# 3. build-docker: Build Docker images
# 4. deploy: Deploy ke Railway (Hanya saat merge ke main)

name: CI/CD Pipeline — Miracle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# OPTIMASI DEVOPS: Cancel run lama jika ada push baru
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ================================
  # JOB 1: Test Backend
  # ================================
  test-backend:
    name: 🐍 Test Backend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./backend
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: tracelt_test
        ports:
          - 5432:5432
        options: --health-cmd "pg_isready -U postgres" --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🧪 Run tests with coverage
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tracelt_test
          SECRET_KEY: test-secret-key-for-ci
        run: |
          pytest --cov=. --cov-report=term-missing --cov-fail-under=50

  # ================================
  # JOB 2: Test Frontend
  # ================================
  test-frontend:
    name: ⚛️ Test Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: 📥 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

      - name: ⚒️ Build Frontend
        run: npm run build

  # ================================
  # JOB 3: Build Docker
  # ================================
  build-docker:
    name: 🐳 Build Docker
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Build backend image
        run: docker build -t miracle-backend:ci ./backend

      - name: 🐳 Build frontend image
        run: docker build -t miracle-frontend:ci ./frontend

      - name: ✅ Build success
        run: echo "✅ All Docker images built successfully!"

  # ================================
  # JOB 4: Deploy ke Railway & Health Check
  # ================================
  deploy:
    name: 🚀 Deploy to Railway
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, build-docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🚂 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy Backend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd backend
          railway up --service tracelt-backend --detach

      - name: 🚀 Deploy Frontend
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          cd frontend
          railway up --service tracelt-frontend --detach

      # OTOMASI HEALTH CHECK
      - name: 🏥 Health check Backend
        run: |
          echo "Waiting for backend deployment to be ready..."
          sleep 30
          
          HEALTH_URL="https://tracelt-backend-production.up.railway.app/health"
          for i in {1..10}; do
            if curl -s -f $HEALTH_URL > /dev/null; then
              echo "✅ Backend Health check passed!"
              exit 0
            fi
            echo "Attempt $i/10 - waiting..."
            sleep 10
          done
          echo "⚠️ Backend health check failed after retries."
          exit 1

      - name: ✅ Deploy complete
        run: |
          echo "✅ Deployment successful!"
          echo "Backend : https://tracelt-backend-production.up.railway.app"
          echo "Frontend: https://tracelt-frontend-production.up.railway.app"