[pytest]
# Konfigurasi pytest untuk menentukan lokasi dan pola test.
testpaths = tests
# Hanya file yang diawali test_*.py yang dijalankan.
python_files = test_*.py
# Hanya fungsi yang diawali test_ yang dianggap test.
python_functions = test_*
# Opsi default: verbose dan traceback singkat.
addopts = -v --tb=short