upstream auth_service {
    server auth-service:8001;
}

upstream donor_service {
    server item-service:8002;
}

upstream frontend {
    server frontend:80;
}

server {
    listen 80;
    server_name localhost;

    # ===================== HEALTH CHECKS =====================

    location = /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway"}';
    }

    location = /auth/health {
        proxy_pass http://auth_service/health;
        proxy_set_header Host $host;
    }

    location = /donor/health {
        proxy_pass http://donor_service/health;
        proxy_set_header Host $host;
    }

    # ===================== API ROUTES =====================

    # Auth Service: /auth/* → auth-service /*
    # Contoh: /auth/register → :8001/register
    #         /auth/login    → :8001/login
    #         /auth/verify   → :8001/verify (dipanggil internal oleh donor-service)
    location /auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Donor Service: /pendonor* → donor-service /pendonor*
    location /pendonor {
        proxy_pass http://donor_service/pendonor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Donor Service: /riwayat-donor* → donor-service /riwayat-donor*
    location /riwayat-donor {
        proxy_pass http://donor_service/riwayat-donor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Donor Service: /pengguna/* → donor-service /pengguna/*
    # Contoh: /pengguna/riwayat-donor → :8002/pengguna/riwayat-donor
    location /pengguna {
        proxy_pass http://donor_service/pengguna;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
    }

    # Public API: /api/public/* → donor-service /api/public/*
    location /api/public {
        proxy_pass http://donor_service/api/public;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ===================== FRONTEND =====================

    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;
    }
}
