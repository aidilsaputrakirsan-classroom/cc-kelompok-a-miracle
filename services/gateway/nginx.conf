# ============================================================
# Nginx API Gateway — Tracelt Microservices
# Komputasi Awan - Modul 14
# Sesuai Modul 15.1
# ============================================================

# Rate limiting zones (Modul 15 — Security Hardening)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=general_limit:10m rate=30r/s;

upstream auth_service {
    server auth-service:8001;
}

upstream donor_service {
    server item-service:8002;
}

upstream frontend {
    server frontend:80;
}

# Correlation ID for tracing (Modul 14.2)
map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    "" $request_id;
}

server {
    listen 80;
    server_name localhost;

    # ===================== HEALTH CHECKS & METRICS =====================
    location = /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway", "uptime_seconds": 0}';
    }

    location = /metrics {
        default_type application/json;
        return 200 '{"service":"gateway","uptime_seconds":0,"total_requests":0,"total_errors":0,"error_rate_percent":0,"latency":{},"endpoints":{}}';
    }

    location = /auth/health {
        proxy_pass http://auth_service/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /auth/metrics {
        proxy_pass http://auth_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;
    }

    location = /donor/health {
        proxy_pass http://donor_service/health;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /donor/metrics {
        proxy_pass http://donor_service/metrics;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;
    }

    # ===================== API ROUTES =====================

    # Login endpoints — rate limit ketat (brute force protection)
    location = /auth/admin/login {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_service/admin/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    location = /auth/pengguna/login {
        limit_req zone=auth_limit burst=10 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_service/pengguna/login;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    # Register endpoints — rate limit ketat (burst lebih kecil)
    location = /auth/admin/register {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_service/admin/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    location = /auth/pengguna/register {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_service/pengguna/register;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    # Auth Service — rute lainnya
    location /auth/ {
        limit_req zone=general_limit burst=20 nodelay;
        limit_req_status 429;
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    # Donor Service Routes
    location /api/ {
        limit_req zone=api_limit burst=30 nodelay;
        proxy_pass http://donor_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    location /pendonor {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://donor_service/pendonor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    location /riwayat-donor {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://donor_service/riwayat-donor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    location /pengguna {
        limit_req zone=api_limit burst=30 nodelay;
        limit_req_status 429;
        proxy_pass http://donor_service/pengguna;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    # ===================== FRONTEND =====================
    location / {
        limit_req zone=general_limit burst=50 nodelay;
        limit_req_status 429;
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;

        # CORS untuk frontend SPA
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }
}
