# ============================================================
# Nginx API Gateway — Tracelt Microservices
# Komputasi Awan - Modul 14
# ============================================================

upstream auth_service {
    server auth-service:8001;
}

upstream donor_service {
    server item-service:8002;
}

upstream frontend {
    server tracelt-frontend:80;
}

# Correlation ID for tracing (Modul 14.2)
map $http_x_correlation_id $correlation_id {
    default $http_x_correlation_id;
    "" $request_id;
}

server {
    listen 80;
    server_name localhost;

    # ===================== HEALTH CHECKS =====================
    location = /health {
        default_type application/json;
        return 200 '{"status": "healthy", "service": "gateway"}';
    }

    location = /auth/health {
        proxy_pass http://auth_service/health;
        proxy_set_header Host $host;
    }

    location = /donor/health {
        proxy_pass http://donor_service/health;
        proxy_set_header Host $host;
    }

    # ===================== API ROUTES =====================

    # Auth Service
    location /auth/ {
        proxy_pass http://auth_service/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        # CORS
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    # Donor Service Routes
    location /pendonor {
        proxy_pass http://donor_service/pendonor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    location /riwayat-donor {
        proxy_pass http://donor_service/riwayat-donor;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    location /pengguna {
        proxy_pass http://donor_service/pengguna;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Correlation-ID $correlation_id;
        add_header X-Correlation-ID $correlation_id always;

        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }

    # ===================== FRONTEND =====================
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
        proxy_buffering off;

        # CORS untuk frontend SPA
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' '*' always;
    }
}