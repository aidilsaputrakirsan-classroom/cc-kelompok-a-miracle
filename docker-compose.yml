# ============================================================
# Docker Compose — Tracelt Microservices                     # Nama file konfigurasi utama
# Komputasi Awan — SI ITK (Modul 14 Ready)                  # Keterangan project dan modul
# ============================================================
# Usage:                                                    # Bagian penjelasan cara pakai
#   docker compose up -d          # Start semua services
#   docker compose down            # Stop & remove
#   docker compose logs -f         # Lihat logs
#   docker compose ps              # Status services
# ============================================================

services:                                                   # Mulai definisi semua container/service

  # ==================== DATABASES ====================     # Bagian untuk database

  auth-db:                                                  # Nama service database auth
    image: postgres:15                                      # Menggunakan image PostgreSQL versi 15
    container_name: tracelt-auth-db                         # Nama container yang akan dibuat
    ports:
      - "5433:5432"                                         # Membuka port 5433 di laptop ke port 5432 di container
    environment:                                            # Variabel environment untuk container
      POSTGRES_DB: auth_db                                  # Nama database yang dibuat otomatis
      POSTGRES_USER: postgres                               # Username database
      POSTGRES_PASSWORD: postgres                           # Password database
    volumes:
      - auth_db_data:/var/lib/postgresql/data               # Menyimpan data database secara permanen
    healthcheck:                                            # Cara mengecek apakah database sehat
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]  # Perintah pengecekan
      interval: 5s                                          # Cek setiap 5 detik
      timeout: 3s                                           # Maksimal 3 detik untuk jawab
      retries: 5                                            # Coba ulang 5 kali kalau gagal
      start_period: 10s                                     # Tunggu 10 detik sebelum mulai cek
    restart: unless-stopped                                 # Restart otomatis kalau mati (kecuali manual stop)
    # Fungsi: Database khusus untuk data user, login, register, dan token

  item-db:                                                  # Nama service database item/pendonor
    image: postgres:15
    container_name: tracelt-item-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_DB: item_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - item_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d item_db"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    # Fungsi: Database khusus untuk data pendonor dan riwayat donor

  # ==================== MICROSERVICES ====================

  auth-service:                                             # Service autentikasi
    build: ./services/auth-service                          # Build image dari folder ini
    container_name: tracelt-auth-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@auth-db:5432/auth_db   # Koneksi ke database
      SECRET_KEY: ${SECRET_KEY:-supersecretkeychangeme123}
      CORS_ORIGINS: "http://localhost,http://localhost:5173,http://127.0.0.1,http://localhost:80"
      SERVICE_NAME: auth-service
      LOG_LEVEL: INFO
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "auth-service"
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    # Fungsi: Mengurus register, login, JWT token, dan verifikasi user

  item-service:                                             # Service data pendonor
    build: ./services/item-service
    container_name: tracelt-item-service
    environment:
      DATABASE_URL: postgresql://postgres:postgres@item-db:5432/item_db
      AUTH_SERVICE_URL: http://auth-service:8001
      CORS_ORIGINS: "http://localhost,http://localhost:5173,http://tracelt-frontend-production.up.railway.app,https://tracelt-frontend-production.up.railway.app,http://localhost:80"
      SERVICE_NAME: item-service
      LOG_LEVEL: INFO
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
        tag: "item-service"
    depends_on:
      item-db:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 15s
      timeout: 30s
      retries: 8
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.2'
          memory: 256M
    # Fungsi: Mengurus operasi pendonor (tambah, lihat, edit, hapus)

  # ==================== FRONTEND ====================

  frontend:                                                 # Service tampilan website
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost
    container_name: tracelt-frontend
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.3'
          memory: 300M
    # Fungsi: Menyajikan halaman website (React/Vite) ke browser user

  # ==================== GATEWAY (Nginx) ====================

  gateway:                                                  # Service utama sebagai pintu masuk
    image: nginx:alpine
    container_name: tracelt-gateway
    ports:
      - "80:80"                                             # Membuka akses dari browser ke port 80
    volumes:
      - ./services/gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro   # Memasukkan file konfigurasi nginx
    depends_on:
      auth-service:
        condition: service_healthy
      item-service:
        condition: service_healthy
      frontend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/health"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    # Fungsi: API Gateway - Mengatur routing, CORS, rate limiting, correlation ID

# ============================================================
# NETWORKS
# ============================================================
networks:
  default:
    name: tracelt-network
    driver: bridge
    # Fungsi: Membuat jaringan internal agar semua container bisa saling berkomunikasi

volumes:
  auth_db_data:                                             # Volume untuk menyimpan data auth secara permanen
  item_db_data:                                             # Volume untuk menyimpan data pendonor secara permanen